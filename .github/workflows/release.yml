name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.pull_request.merge_commit_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  detect-changes:
    name: Detect Release Changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    outputs:
      cli_changed: ${{ steps.filter.outputs.cli }}
      desktop_changed: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            cli:
              - 'packages/cli/**'
              - 'internal/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/actions/setup-bun/**'
            desktop:
              - 'packages/desktop/**'
              - 'internal/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/actions/setup-bun/**'

  tag-cli:
    name: Tag CLI Release
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.cli_changed == 'true'
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create and push tag
        id: create-tag
        run: |
          VERSION=$(jq -r .version packages/cli/package.json)
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  tag-desktop:
    name: Tag Desktop Release
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.desktop_changed == 'true'
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create and push tag
        id: create-tag
        run: |
          VERSION=$(jq -r .version packages/desktop/package.json)
          TAG="desktop-v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  build-desktop:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    needs: [tag-desktop]
    if: needs.tag-desktop.outputs.tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build desktop installer
        run: bun run --filter '@ody/desktop' make

      - name: Upload artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ody-desktop-macos
          path: packages/desktop/out/make/**/*

  build-cli:
    name: Build CLI (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    needs: [tag-cli]
    if: needs.tag-cli.outputs.tag != ''
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: ody-darwin-arm64
          - target: bun-darwin-x64
            artifact: ody-darwin-x64
          - target: bun-linux-x64
            artifact: ody-linux-x64
          - target: bun-linux-arm64
            artifact: ody-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build binary
        working-directory: packages/cli
        run: bun build --production --compile --target=${{ matrix.target }} --outfile=./dist/${{ matrix.artifact }} ./src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/${{ matrix.artifact }}

  release-cli:
    name: Create CLI Release
    runs-on: ubuntu-latest
    needs: [tag-cli, build-cli]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract changelog
        id: changelog
        run: |
          BODY=$(awk '/^## /{if(found) exit; found=1; next} found' packages/cli/CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ needs.tag-cli.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*

  release-desktop:
    name: Create Desktop Release
    runs-on: ubuntu-latest
    needs: [tag-desktop, build-desktop]
    if: needs.tag-desktop.outputs.tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Download desktop artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          name: ody-desktop-macos
          path: desktop-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ needs.tag-desktop.outputs.tag }}
          name: Ody Desktop ${{ replace(needs.tag-desktop.outputs.tag, 'desktop-', '') }}
          generate_release_notes: true
          files: desktop-artifacts/**/*
