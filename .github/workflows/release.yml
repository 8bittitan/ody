name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.pull_request.merge_commit_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create and push tag
        id: create-tag
        run: |
          VERSION=$(jq -r .version packages/cli/package.json)
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.tag != ''
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: ody-darwin-arm64
          - target: bun-darwin-x64
            artifact: ody-darwin-x64
          - target: bun-linux-x64
            artifact: ody-linux-x64
          - target: bun-linux-arm64
            artifact: ody-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build binary
        working-directory: packages/cli
        run: bun build --production --compile --target=${{ matrix.target }} --outfile=./dist/${{ matrix.artifact }} ./src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@d3f86a10f4d9684af3e5c0a18b7b0710ee6ede64 # v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [tag, build]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract changelog
        id: changelog
        run: |
          BODY=$(awk '/^## /{if(found) exit; found=1; next} found' packages/cli/CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81ac5367125db27d57f7be3901200ecccdf2 # v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*
