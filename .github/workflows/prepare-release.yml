name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      desktop_bump:
        description: 'Desktop version bump type'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none
      summary:
        description: 'Release summary (optional — used in changelog)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Get current version
        id: current
        run: echo "version=$(jq -r .version packages/cli/package.json)" >> "$GITHUB_OUTPUT"

      - name: Get current desktop version
        id: current_desktop
        run: echo "version=$(jq -r .version packages/desktop/package.json)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Find the latest tag, or fall back to the root commit
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          # Collect commits since the last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%h %s")

          FEATURES=""
          FIXES=""
          REFACTORS=""
          PERF=""
          DOCS=""
          MAINTENANCE=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue

            SHA=$(echo "$line" | awk '{print $1}')
            MSG=$(echo "$line" | cut -d' ' -f2-)

            # Match conventional commit pattern: type(scope)?: description
            if ! echo "$MSG" | grep -qE '^[a-z]+(\(.+\))?!?:'; then
              continue
            fi

            TYPE=$(echo "$MSG" | sed -E 's/^([a-z]+)(\(.+\))?!?:.*/\1/')
            DESC=$(echo "$MSG" | sed -E 's/^[a-z]+(\(.+\))?!?: *//')

            case "$TYPE" in
              feat)     FEATURES="${FEATURES}- ${DESC} (${SHA})\n" ;;
              fix)      FIXES="${FIXES}- ${DESC} (${SHA})\n" ;;
              refactor) REFACTORS="${REFACTORS}- ${DESC} (${SHA})\n" ;;
              perf)     PERF="${PERF}- ${DESC} (${SHA})\n" ;;
              docs)     DOCS="${DOCS}- ${DESC} (${SHA})\n" ;;
              chore|ci|build|test) MAINTENANCE="${MAINTENANCE}- ${DESC} (${SHA})\n" ;;
            esac
          done <<< "$COMMITS"

          CHANGELOG=""
          [ -n "$FEATURES" ]    && CHANGELOG="${CHANGELOG}### Features\n${FEATURES}\n"
          [ -n "$FIXES" ]       && CHANGELOG="${CHANGELOG}### Bug Fixes\n${FIXES}\n"
          [ -n "$REFACTORS" ]   && CHANGELOG="${CHANGELOG}### Refactors\n${REFACTORS}\n"
          [ -n "$PERF" ]        && CHANGELOG="${CHANGELOG}### Performance\n${PERF}\n"
          [ -n "$DOCS" ]        && CHANGELOG="${CHANGELOG}### Documentation\n${DOCS}\n"
          [ -n "$MAINTENANCE" ] && CHANGELOG="${CHANGELOG}### Maintenance\n${MAINTENANCE}\n"

          {
            echo "changelog<<CHANGELOG_EOF"
            echo -e "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create changeset
        run: |
          SUMMARY="${{ inputs.summary }}"
          DESKTOP_BUMP="${{ inputs.desktop_bump }}"
          DESKTOP_CHANGESET=""

          if [ "$DESKTOP_BUMP" != "none" ]; then
            DESKTOP_CHANGESET="'@ody/desktop': ${DESKTOP_BUMP}"
          fi

          if [ -z "$SUMMARY" ]; then
            CHANGELOG="${{ steps.changelog.outputs.changelog }}"
            if [ -n "$CHANGELOG" ]; then
              SUMMARY="$CHANGELOG"
            else
              SUMMARY="Release (${{ inputs.bump }} bump)"
            fi
          fi

          mkdir -p .changeset
          cat > .changeset/release-bump.md << EOF
          ---
          '@ody/cli': ${{ inputs.bump }}
          ${DESKTOP_CHANGESET}
          ---

          ${SUMMARY}
          EOF

      - name: Version packages
        run: bunx changeset version

      - name: Get new version
        id: new
        run: |
          echo "version=$(jq -r .version packages/cli/package.json)" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.desktop_bump }}" != "none" ]; then
            echo "desktop_version=$(jq -r .version packages/desktop/package.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build pull request metadata
        id: pr-metadata
        run: |
          VERSION='${{ steps.new.outputs.version }}'
          CURRENT_VERSION='${{ steps.current.outputs.version }}'
          DESKTOP_BUMP='${{ inputs.desktop_bump }}'
          SUMMARY='${{ inputs.summary }}'
          CHANGELOG='${{ steps.changelog.outputs.changelog }}'

          if [ "$DESKTOP_BUMP" != 'none' ]; then
            DESKTOP_VERSION='${{ steps.new.outputs.desktop_version }}'
            CURRENT_DESKTOP_VERSION='${{ steps.current_desktop.outputs.version }}'
            TITLE="Release v${VERSION} + Desktop v${DESKTOP_VERSION}"
            DESKTOP_LINE="Desktop bump: \`${DESKTOP_BUMP}\` (from v${CURRENT_DESKTOP_VERSION} to v${DESKTOP_VERSION})"
          else
            TITLE="Release v${VERSION}"
            DESKTOP_LINE='Desktop bump: `none`'
          fi

          if [ -z "$SUMMARY" ]; then
            SUMMARY="$CHANGELOG"
          fi

          if [ -z "$SUMMARY" ]; then
            SUMMARY='No changelog available.'
          fi

          {
            echo "title=$TITLE"
            echo 'body<<BODY_EOF'
            echo "## Release v${VERSION}"
            echo
            echo "Bump type: \`${{ inputs.bump }}\` (from v${CURRENT_VERSION})"
            echo "$DESKTOP_LINE"
            echo
            echo "$SUMMARY"
            echo
            echo '---'
            echo
            echo 'This PR was auto-generated by the Prepare Release workflow.'
            echo 'Merging it will trigger tag creation and binary builds.'
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'release: v${{ steps.new.outputs.version }}'
          title: ${{ steps.pr-metadata.outputs.title }}
          body: ${{ steps.pr-metadata.outputs.body }}
          branch: release/v${{ steps.new.outputs.version }}
          base: main
          delete-branch: true
